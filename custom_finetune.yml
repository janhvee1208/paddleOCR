Global:
  use_gpu: false
  distributed: false
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ./output/rec/
  save_epoch_step: 10
  eval_batch_step: 100
  cal_metric_during_train: true
  # ✅ Keep pointing to your V4 model
  pretrained_model: ./models/rec_v4/best_accuracy
  checkpoints:
  save_inference_dir:
  use_visualdl: false
  infer_img:
  character_dict_path: ppocr/utils/dict/en_dict.txt
  max_text_length: 25
  use_space_char: false

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.001
  regularizer:
    name: L2
    factor: 0.00001

# ✅ HYBRID ARCHITECTURE (V4 Backbone + Simple Head)
Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  # We move the SVTR encoder here to make it a standard "Neck"
  Neck:
    name: SequenceEncoder
    encoder_type: svtr
    dims: 64
    depth: 2
    hidden_dims: 120
    use_guide: True
  # We use a single CTCHead (No MultiHead = No List Error)
  Head:
    name: CTCHead
    fc_decay: 0.00001

# ✅ SINGLE LOSS (Fixes Index Error)
Loss:
  name: CTCLoss

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: False

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data/rec/
    label_file_list:
      - ./train_data/rec/rec_gt_train.txt
    delimiter: "\t"
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecResizeImg:
          image_shape: [3, 32, 320]
      - CTCLabelEncode:
          character_dict_path: ppocr/utils/dict/en_dict.txt
          use_space_char: false
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  loader:
    shuffle: true
    batch_size_per_card: 2
    drop_last: true
    num_workers: 0

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data/rec/
    label_file_list:
      - ./train_data/rec/rec_gt_val.txt
    delimiter: "\t"
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecResizeImg:
          image_shape: [3, 32, 320]
      - CTCLabelEncode:
          character_dict_path: ppocr/utils/dict/en_dict.txt
          use_space_char: false
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 2
    num_workers: 0