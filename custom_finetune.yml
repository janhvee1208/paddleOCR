Global:
  use_gpu: false
  distributed: false
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ./output/rec/
  save_epoch_step: 10
  eval_batch_step: 100
  cal_metric_during_train: true
  pretrained_model:
  checkpoints:
  save_inference_dir:
  use_visualdl: false
  infer_img:
  character_dict_path: ppocr/utils/dict/en_dict.txt
  max_text_length: 25
  use_space_char: false

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.001
  regularizer:
    name: L2
    factor: 0.00001

Architecture:
  model_type: rec
  algorithm: CRNN
  Transform:
  Backbone:
    name: MobileNetV3
    scale: 0.5
    model_name: small
  Neck:
    name: SequenceEncoder
    encoder_type: rnn
    hidden_size: 96
  Head:
    name: CTCHead
    fc_decay: 0.00001

Loss:
  name: CTCLoss

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

# ============================================================
#  ✅ UPDATED TRAIN SECTION TO MATCH YOUR FOLDER STRUCTURE
# ============================================================
Train:
  dataset:
    name: SimpleDataSet
    # Point directly to the folder containing images
    data_dir: ./train_data/rec/
    # Point to your text file
    label_file_list:
      - ./train_data/rec/rec_gt_train.txt
    delimiter: "\t"
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecResizeImg:
          image_shape: [3, 32, 320]
      - CTCLabelEncode:
          character_dict_path: ppocr/utils/dict/en_dict.txt
          use_space_char: false
      - KeepKeys:
          keep_keys: ['image', 'label','length']
  loader:
    shuffle: true
    batch_size_per_card: 8
    drop_last: true
    num_workers: 0

# ============================================================
#  ✅ UPDATED EVAL SECTION (Required for training to run)
# ============================================================
Eval:
  dataset:
    name: SimpleDataSet
    # Point to your val folder (I saw it in your screenshot)
    data_dir: ./train_data/rec/
    # Point to your val text file
    label_file_list:
      - ./train_data/rec/rec_gt_val.txt
    delimiter: "\t"
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecResizeImg:
          image_shape: [3, 32, 320]
      - CTCLabelEncode:
          character_dict_path: ppocr/utils/dict/en_dict.txt
          use_space_char: false
      - KeepKeys:
          keep_keys: ['image', 'label' , 'length']
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 8
    num_workers: 0